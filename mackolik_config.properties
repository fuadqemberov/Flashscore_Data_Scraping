# mackolik_config.properties

# Analiz edilecek sezonlar (virgülle ayrılmış, örn: 2023,2022,2021)
# OptimizedScoreAnalyzer2 tarafından kullanılacak
analysis_years=2023,2022,2021

# TeamIdFinder tarafından okunacak ve yazılacak takım ID'leri dosyasının adı
team_ids_file=team_ids.txt

# ChromeDriver'ın yolu
webdriver_path=src\chrome\chromedriver.exe

# TeamIdFinder tarafından kullanılacak lig ID'leri (virgülle ayrılmış)
league_ids=67483

# Mackolik arşiv base URL
mackolik_arsiv_base_url=https://arsiv.mackolik.com

# Mevcut sezon (findCurrentSeasonLastTwoMatches için)
# OptimizedScoreAnalyzer2 -> MatchResult.findCurrentSeasonLastTwoMatches içinde kullanılır
current_season_for_pattern=2024/2025

# Mackolik analiz sonuçları için CSV dosya adı
mackolik_output_csv_file=mackolik_results.csv
